<div class="card shadow-sm mb-4">
  <div class="card-header bg-info text-white">
    <h5 class="mb-0">Selectores Anidados — País</h5>
  </div>
  <div class="card-body">
    <form [formGroup]="myForm" (ngSubmit)="onSubmit()">

      <div class="row mb-3">
        <label for="region" class="col-sm-3 col-form-label fw-semibold">Continente</label>
        <div class="col-sm-9">
          <select id="region" formControlName="region" class="form-select"
                  [class.is-invalid]="myForm.get('region')?.invalid && myForm.get('region')?.touched">
            <option value="">-- Seleccione Continente --</option>
            @for (region of regions; track region) {
              <option [value]="region">{{ region }}</option>
            }
          </select>
          <div class="invalid-feedback">Seleccione un continente.</div>
        </div>
      </div>

      <div class="row mb-3">
        <label for="country" class="col-sm-3 col-form-label fw-semibold">País</label>
        <div class="col-sm-9">
          <select id="country" formControlName="country" class="form-select">
            <option value="">-- Seleccione País --</option>
            @for (country of countries; track country.cca3) {
              <option [value]="country.cca3">{{ country.name }}</option>
            }
          </select>
        </div>
      </div>

      <div class="row mb-3">
        <label for="border" class="col-sm-3 col-form-label fw-semibold">Fronteras</label>
        <div class="col-sm-9">
          <select id="border" formControlName="border" class="form-select">
            <option value="">-- Seleccione la frontera --</option>
            @for (border of borders; track border.cca3) {
              <option [value]="border.cca3">{{ border.name }}</option>
            }
          </select>
          @if (myForm.get('country')?.enabled && borders.length === 0 && myForm.get('country')?.value) {
            <div class="form-text text-muted fst-italic">Este país no tiene fronteras registradas.</div>
          }
        </div>
      </div>

      <div class="row">
        <div class="col text-end">
          <button type="submit" class="btn btn-info text-white">Buscar</button>
        </div>
      </div>

    </form>
  </div>
</div>

<div class="card shadow-sm bg-light">
  <div class="card-header">
    <h6 class="mb-0 text-muted">Estado del formulario</h6>
  </div>
  <div class="card-body small">
    <div><span class="badge bg-success">Valid</span> {{ myForm.valid | json }}</div>
    <hr class="my-2">
    <span class="badge bg-dark">Value</span>
    <pre class="mt-1 mb-0">{{ myForm.getRawValue() | json }}</pre>
  </div>
</div>
